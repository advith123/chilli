<!-- 6. FAQPage — ADD TO varieties.html                            -->
<!-- ============================================================ -->

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is the SHU (heat) of Guntur Sannam S4?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Guntur Sannam S4 measures 35,000 to 40,000 SHU (Scoville Heat Units), placing it in the medium-high heat band. Its capsaicin content averages 0.226%, with ASTA color value of 32-38, making it the most commercially traded heat-driven Indian dry red chilli variety."
      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between Teja S17 and Guntur Sannam?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Teja S17 is roughly twice as pungent as Guntur Sannam (75,000-90,000 SHU vs 35,000-40,000 SHU) and is favored for capsaicin/oleoresin extraction. Guntur Sannam offers stronger color (ASTA 32-38 vs Teja's 18-25) and is preferred for culinary blends. Teja is grown predominantly in the Warangal-Khammam belt; Guntur Sannam in the Guntur district."
      }
    },
    {
      "@type": "Question",
      "name": "Is Byadgi chilli low-pungent? What is its ASTA color?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Byadgi Kaddi is a low-heat variety (~10,000-15,000 SHU) prized for its deep red color, with ASTA values typically 60-85. It is the preferred raw material for oleoresin extraction and natural food coloring, and is widely used in South Indian sambar masalas."
      }
    },
    {
      "@type": "Question",
      "name": "Which Indian red chilli variety has the highest color value?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Kashmiri Deghi Mirch has the highest ASTA color value among Indian dry red chillies, typically 90-110, with very low heat (under 2,000 SHU). It is used purely as a natural colorant in dishes, sauces, and processed foods where deep red color is needed without pungency."
      }
    },
    {
      "@type": "Question",
      "name": "What is the typical moisture content of export-grade Indian dry chillies?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Export-grade Indian dry red chillies are dried to a moisture content of 10-11% maximum. Below 10% the chillies become brittle and lose color in transit; above 12% they risk mold growth during ocean transit. Vijaya Enterprises tests every lot before packing."
      }
    }
  ]
}
</script>
